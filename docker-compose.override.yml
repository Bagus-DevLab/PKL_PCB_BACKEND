# Development overrides - otomatis dimuat oleh docker compose
# File ini untuk development dengan hot-reload
#
# Development: docker compose up -d (otomatis pakai override)
# Production:  docker compose -f docker-compose.yml up -d (tanpa override)

services:
  backend:
    # Development: langsung Uvicorn dengan hot-reload
    # (tanpa Nginx/Supervisor — frontend dijalankan terpisah via npm run dev)
    command: uvicorn app.main:app --host 0.0.0.0 --port 80 --reload
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./logs:/app/logs
      - ./firebase-adminsdk.json:/app/firebase-adminsdk.json
    healthcheck:
      # Override: cek langsung ke Uvicorn (yang listen di port 80 agar cocok dengan port mapping)
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:80/api/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
