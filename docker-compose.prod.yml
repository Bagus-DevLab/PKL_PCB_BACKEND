# ===========================================
# Production overrides
# ===========================================
# Penggunaan:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# File ini:
# - Menandai volume postgres sebagai external (tidak bisa dihapus oleh docker compose down -v)
# - Menghilangkan hot-reload dan dev tools

services:
  backend:
    # Production: tidak ada hot-reload, tidak ada source mount
    restart: always
    # CMD dari Dockerfile (supervisord) — tidak di-override

  mqtt_worker:
    restart: always

volumes:
  postgres_data:
    # PROTEKSI: Volume ditandai external agar tidak bisa dihapus
    # oleh 'docker compose down -v' secara tidak sengaja.
    #
    # Volume ini sudah ada di VPS dengan nama 'api-pcb_postgres_data'
    # (dibuat oleh docker compose project 'api-pcb' sebelumnya).
    #
    # Jika volume belum ada, docker compose akan error — ini DISENGAJA
    # sebagai safety net agar tidak membuat volume baru yang kosong.
    external: true
    name: api-pcb_postgres_data
