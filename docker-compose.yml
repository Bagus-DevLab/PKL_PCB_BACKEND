version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: pcb_pkl_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: pcb_pkl_mosquitto
    restart: always
    ports:
      - "1883:1883" # Tetap dibuka untuk alat fisik IoT, pastikan wajibkan auth di mosquitto.conf!
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - iot_network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1883 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: .
    container_name: pcb_pkl_backend
    restart: always
    ports:
      # KUNCI KEAMANAN: Bind ke 127.0.0.1 agar tidak tembus ke publik
      - "127.0.0.1:8001:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./firebase-adminsdk.json:/app/firebase-adminsdk.json
    networks:
      - iot_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy

  mqtt_worker:
    build: .
    container_name: pcb_pkl_mqtt_worker
    restart: always
    command: python app/mqtt/mqtt_worker.py
    environment:
      - PYTHONPATH=/app
    env_file:
      - .env
    networks:
      - iot_network
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  iot_network:
    driver: bridge